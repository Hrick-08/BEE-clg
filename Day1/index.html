<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>
    <div id="container">
        <div id="formDiv">
            <div>
                <label for="">Movie Image URL</label>
                <input type="text" name="" id="url" placeholder="Enter Image URL" />
            </div>
            <div>
                <label for="">Movie Title</label>
                <input type="text" name="" id="title" placeholder="Enter Title" />
            </div>
            <div>
                <label for="">Movie Rating</label>
                <input type="text" name="" id="rating" placeholder="Enter Rating" />
            </div>
            <div>
                <button id="submit">Submit</button>
            </div>
        </div>
        <div id="carDiv">
            <div class="card">
                <img src="https://i.pinimg.com/originals/45/b8/e5/45b8e54c53ec850a19cc906ef5f01e36.jpg" alt="">
                <p>Movie : Avtar</p>
                <h3>Rating : 4</h3>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
