<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Form</title>

<style>
    body{
        font-family: "Times New Roman", serif;
        margin:40px;
    }

    .container{
        width:550px;
        border:1px solid black;
        padding:30px;
    }

    table{
        border-collapse:collapse;
        width:100%;
        margin-top:20px;
    }

    table, th, td{
        border:1px solid black;
    }

    th, td{
        padding:10px;
        text-align:center;
        font-size:18px;
    }

    label{
        display:inline-block;
        width:80px;
        font-size:22px;
    }

    input{
        width:300px;
        height:35px;
        font-size:20px;
        margin-bottom:15px;
    }

    button{
        margin-left:110px;
        width:160px;
        height:70px;
        font-size:22px;
        cursor:pointer;
    }

    h1{
        margin-top:40px;
        font-size:48px;
    }
</style>
</head>

<body>

<div class="container">

    <form id="studentForm">
        <label>Name:</label>
        <input type="text" id="name" required placeholder="Enter your name"><br>

        <label>Email:</label>
        <input type="email" id="email" required placeholder="Enter your email"><br>

        <label>Age:</label>
        <input type="number" id="age" required placeholder="Enter your age"><br>

        <button type="submit">Submit</button>
    </form>

</div>

<h1>Students Data</h1>

<table id="studentTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>Aman</td>
            <td>aman@gmail.com</td>
            <td>32</td>
        </tr>

        <tr>
            <td>Pratik</td>
            <td>pratik@gmail.com</td>
            <td>37</td>
        </tr>
    </tbody>
</table>

<script>
    var form = document.getElementById("studentForm");
    form.addEventListener("submit", handleInput)

    function handleInput(event){
        event.preventDefault();

        var name = document.getElementById("name").value;
        var email = document.getElementById("email").value;
        var age = document.getElementById("age").value;

        var table = document.getElementById("studentTable").getElementsByTagName("tbody")[0];

        var row = table.insertRow();

        row.insertCell(0).innerHTML = name;
        row.insertCell(1).innerHTML = email;
        row.insertCell(2).innerHTML = age;

        document.getElementById("studentForm").reset();
    }
</script>

</body>
</html>
